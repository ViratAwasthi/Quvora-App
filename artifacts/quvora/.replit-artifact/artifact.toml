kind = "web"
previewPath = "/"
title = "Quvora Consulting"
version = "1.0.0"
id = "artifacts/quvora"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20978

[services.development]
run = "pnpm --filter @workspace/quvora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quvora", "run", "build" ]
publicDir = "artifacts/quvora/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20978"
BASE_PATH = "/"
